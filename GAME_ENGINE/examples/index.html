<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Gaming Vibe Coding Engine Lab</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10131a;
        --panel: #171b24;
        --panel-2: #202635;
        --line: #343d52;
        --text: #eef2ff;
        --muted: #aeb8cc;
        --accent: #53c6b8;
        --accent-2: #f6c65b;
        --danger: #ff6b6b;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
      }

      button,
      textarea,
      select,
      input {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
        height: 100vh;
      }

      .panel {
        border-right: 1px solid var(--line);
        background: var(--panel);
        overflow: auto;
        padding: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .brand h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.15;
      }

      .status {
        min-width: 74px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 10px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .status.ready { color: #10131a; background: var(--accent); border-color: var(--accent); }
      .status.error { color: #1f0f12; background: var(--danger); border-color: var(--danger); }

      label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin: 14px 0 7px;
      }

      textarea,
      select,
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0d1118;
        color: var(--text);
        outline: none;
      }

      textarea {
        min-height: 118px;
        resize: vertical;
        padding: 12px;
        line-height: 1.45;
      }

      select,
      input {
        padding: 10px 12px;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        min-height: 38px;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #071411;
        font-weight: 700;
      }

      button:hover { filter: brightness(1.08); }

      .samples {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 8px;
      }

      .samples button {
        text-align: left;
        padding: 10px 12px;
      }

      .capabilities {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .json-box {
        min-height: 250px;
        font-family: "JetBrains Mono", Consolas, monospace;
        font-size: 12px;
        white-space: pre;
      }

      .stage {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        min-width: 0;
        min-height: 0;
      }

      .viewport {
        position: relative;
        min-height: 0;
        background:
          linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
          linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
          #0b0f16;
        background-size: 40px 40px;
      }

      #game-root {
        position: absolute;
        inset: 0;
      }

      .hud-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        border-top: 1px solid var(--line);
        background: var(--line);
      }

      .metric {
        background: #111720;
        padding: 12px 14px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 4px;
      }

      .metric strong {
        font-size: 15px;
        font-weight: 700;
      }

      .toast {
        position: absolute;
        right: 16px;
        top: 16px;
        max-width: 360px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(17, 23, 32, 0.92);
        color: var(--text);
        padding: 10px 12px;
        font-size: 13px;
        pointer-events: none;
      }

      @media (max-width: 920px) {
        body { overflow: auto; }
        .shell {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }
        .panel {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: none;
        }
        .stage {
          min-height: 620px;
        }
        .hud-strip {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="panel">
        <div class="brand">
          <h1>GVC Engine Lab</h1>
          <div id="status" class="status">booting</div>
        </div>

        <label for="prompt">Prompt</label>
        <textarea id="prompt">Create a colorful 3D coin collecting platformer with jumping, score, win scene, lights, UI, prefabs and tweens.</textarea>

        <label for="model-mode">Generation mode</label>
        <select id="model-mode">
          <option value="backend" selected>Backend AI / OpenAI</option>
          <option value="local">Local AI-style generator</option>
          <option value="json">Run JSON editor only</option>
        </select>

        <label for="api-base">Backend API URL</label>
        <input id="api-base" value="http://localhost:3000/api" spellcheck="false" />

        <div class="buttons">
          <button id="generate" class="primary">Generate game</button>
          <button id="run-json">Run JSON</button>
          <button id="copy-json">Copy JSON</button>
          <button id="load-example">Load example</button>
        </div>

        <label>Prompt presets</label>
        <div class="samples">
          <button data-sample="coin">Coin platformer with jumping, score, collectibles and win condition</button>
          <button data-sample="survival">Survival arena with falling hazards, lives bar, timers and spawners</button>
          <button data-sample="quest">Puzzle quest with a key, a door, state conditions and scene transition</button>
        </div>

        <label>Engine capabilities exposed to AI</label>
        <div id="capabilities" class="capabilities"></div>

        <label for="json">Generated GameDefinition JSON</label>
        <textarea id="json" class="json-box" spellcheck="false"></textarea>
      </aside>

      <section class="stage">
        <div class="viewport">
          <div id="game-root"></div>
          <div id="toast" class="toast">Use Generate game, then play with A/D or arrows and Space.</div>
        </div>
        <div class="hud-strip">
          <div class="metric"><span>Generated type</span><strong id="metric-type">none</strong></div>
          <div class="metric"><span>Scene</span><strong id="metric-scene">none</strong></div>
          <div class="metric"><span>State</span><strong id="metric-state">{}</strong></div>
          <div class="metric"><span>Systems</span><strong id="metric-systems">0</strong></div>
        </div>
      </section>
    </main>

    <script type="module" src="./playground.ts"></script>
  </body>
</html>
