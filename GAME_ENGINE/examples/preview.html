<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>LOOMIER GameDefinition Preview</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0f16;
        color: #eef2ff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      }

      #game-root {
        position: fixed;
        inset: 0;
      }

      #fallback {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
        max-width: min(560px, calc(100vw - 32px));
        padding: 14px 16px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(9, 13, 20, 0.92);
        font-size: 13px;
        line-height: 1.5;
        text-align: left;
        pointer-events: none;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
      }

      #fallback ul {
        margin: 6px 0 0;
        padding: 0 0 0 18px;
      }
      #fallback li {
        margin: 2px 0;
      }
      #fallback strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      #fallback.hidden { display: none; }
      #fallback.ready { color: #99f6e4; }
      #fallback.loading { color: #c7d2fe; }
      #fallback.error {
        color: #fecaca;
        border-color: rgba(254, 202, 202, 0.4);
        max-height: calc(100vh - 32px);
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <div id="fallback" class="ready">Preview booting…</div>
    <script type="module" src="./preview.ts"></script>
  </body>
</html>
